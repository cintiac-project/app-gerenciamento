function mesLabelLong(mk){
  if(!mk) return "";
  const p=mk.split("-"); const i=(+p[1])-1;
  const nomes=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  return nomes[i]+" "+p[0];
}
function mesShift(mk,delta){
  const [y,m]=mk.split("-").map(n=>+n);
  const d=new Date(y,m-1+delta,1);
  return d.getFullYear()+"-"+pad(d.getMonth()+1);
}
/* lista de meses (AAAA-MM) centrada no mês atual: 2 meses para trás e o
   restante para a frente — usada no seletor de mês da Ocupação da Equipe,
   já que a ocupação é essencialmente um planejamento futuro. */
function ultimosMeses(n){
  n=n||12;
  const out=[];
  for(let i=-2;i<=n-3;i++) out.push(mesShift(todayStr().slice(0,7), i));
  return out;
}
/* intervalo de meses (AAAA-MM) para o seletor de "Ocupação da Equipe":
   cobre desde o mês mais antigo com atividade prevista (horasPrevistas>0
   no Cronograma) até alguns meses à frente do mês atual. Corrige o caso em
   que o calendário "começava" num mês recente (ex.: sempre 2 meses antes de
   hoje) mesmo havendo atividades com dados desde meses bem anteriores
   (ex.: fevereiro) — essas ficavam fora da lista e pareciam não existir. */
function mesesOcupacaoDisponiveis(){
  const hojeMk=todayStr().slice(0,7);
  let minMk=hojeMk, maxMk=mesShift(hojeMk,9);
  DB.data.atividades.forEach(a=>{
    if((+a.horasPrevistas||0)<=0) return;
    if(a.dataInicioPrev && a.dataInicioPrev.slice(0,7)<minMk) minMk=a.dataInicioPrev.slice(0,7);
    if(a.dataFimPrev && a.dataFimPrev.slice(0,7)>maxMk) maxMk=a.dataFimPrev.slice(0,7);
  });
  minMk=mesShift(minMk,-1); // uma margem de 1 mês antes do primeiro dado
  const out=[];
  let cursor=minMk, guard=0;
  while(cursor<=maxMk && guard<240){ out.push(cursor); cursor=mesShift(cursor,1); guard++; }
  return out;
}
function miniCalendar(reunioes,mk){
  const [y,m]=mk.split("-").map(n=>+n);
  const primeiro=new Date(y,m-1,1);
  const diasNoMes=new Date(y,m,0).getDate();
  const startDow=primeiro.getDay(); // 0=dom
  const reunMap={};
  reunioes.forEach(r=>{
    if(r.data && r.data.startsWith(mk)){
      const dia=+r.data.slice(8,10);
      reunMap[dia]=(reunMap[dia]||0)+1;
    }
  });
  const hojeMk=todayStr().slice(0,7), hojeDia=+todayStr().slice(8,10);
  let h=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:11px;color:var(--ink-faint);font-weight:600;margin-bottom:5px">`;
  ["D","S","T","Q","Q","S","S"].forEach(d=>h+=`<div>${d}</div>`);
  h+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
  for(let i=0;i<startDow;i++) h+=`<div></div>`;
  for(let d=1;d<=diasNoMes;d++){
    const n=reunMap[d]||0;
    const isToday=mk===hojeMk && d===hojeDia;
    const ymd=mk+"-"+pad(d);
    const style=n?`background:var(--accent);color:#fff;font-weight:700`:isToday?`outline:2px solid var(--accent);color:var(--accent);font-weight:700`:`background:#f4f7f8;color:var(--ink-soft)`;
    const cursor=n?"cursor:pointer":"";
    h+=`<div ${n?`data-cal-day="${ymd}"`:""} style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;${style};${cursor}" title="${n?n+' reunião(ões)':''}">${d}</div>`;
  }
  h+=`</div>
  <div style="margin-top:12px;font-size:11.5px;color:var(--ink-faint);text-align:center">
    Dias destacados têm reuniões. Clique para filtrar.</div>`;
  return h;
}

          style="width:100%;min-height:170px;padding:11px;border:1px solid var(--line);border-radius:8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px"></textarea>
        <span class="help">A ata atual (se houver) será substituída pela nova. Você poderá editar tudo depois.</span>
        <div id="ia-err" style="display:none;color:var(--danger);font-size:12px;margin-top:6px;font-weight:600"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="ia-cancel">Cancelar</button>
      <button class="btn" id="ia-apply">Aplicar ata</button>
    </div></div></div>`;

  $("#ia-x").onclick=closeModal;
  $("#ia-cancel").onclick=closeModal;
  $("#ia-copy").onclick=()=>{
    const ta=$("#ia-prompt"); ta.select();
    try{ document.execCommand("copy"); toast("Prompt copiado para a área de transferência."); }
    catch(e){
      if(navigator.clipboard) navigator.clipboard.writeText(prompt).then(()=>toast("Prompt copiado."));
      else toast("Selecione manualmente e copie (Ctrl+C).");
    }
    window.getSelection().removeAllRanges();
  };
  $("#ia-apply").onclick=async()=>{
    const raw=$("#ia-resp").value.trim();
    const err=$("#ia-err"); err.style.display="none";
    if(!raw){ err.textContent="Cole a resposta JSON da IA antes de aplicar."; err.style.display="block"; return; }
    // tenta extrair JSON mesmo com texto extra
    let jsonStr=raw;
    const m=raw.match(/\{[\s\S]*\}/);
    if(m) jsonStr=m[0];
    let parsed;
    try{ parsed=JSON.parse(jsonStr); }
    catch(e){ err.textContent="Não foi possível interpretar o JSON. Verifique se está no formato correto."; err.style.display="block"; return; }
    // valida e aplica
    const ata={
      objetivo: typeof parsed.objetivo==="string"?parsed.objetivo:"",
      topicos: Array.isArray(parsed.topicos)? parsed.topicos.map(t=>({tema:String(t.tema||""),notas:String(t.notas||"")})):[],
      saidas: Array.isArray(parsed.saidas)? parsed.saidas.map(s=>({
        descricao:String(s.descricao||""),
        responsavel:String(s.responsavel||""),
        dataEntrega:String(s.dataEntrega||"")
      })):[]
    };
    r.ata=ata;
    await sbUpdate("reunioes", r.id, { ata });
    closeModal();
    toast("Ata aplicada com sucesso. Edite os campos conforme necessário.");
    render();
  };
}

/* ============================================================
   VIEW: APONTAMENTO DE HORAS
   ============================================================ */
function viewHoras(v){
  $("#topbar-actions").innerHTML=`
    <button class="btn ghost sm" id="btn-legenda-cat" title="Ver o que cada categoria significa">ℹ️ Legenda das categorias</button>
    <button class="btn ghost sm" id="csv-modelo" style="margin-left:6px" title="Baixar modelo de planilha CSV">📋 Modelo CSV</button>
    <button class="btn ghost sm" id="csv-import" style="margin-left:6px" title="Importar apontamentos de planilha CSV">📥 Importar CSV</button>
    <input type="file" id="csv-file" accept=".csv,.txt" style="display:none">
    ${isGestor()?'<button class="btn ghost sm" id="csv-export" style="margin-left:6px" title="Baixar em .CSV os apontamentos filtrados abaixo, para backup">⬇ Exportar CSV</button>':""}
    <button class="btn" id="add-horas" style="margin-left:6px">+ Apontar horas</button>`;
  $("#btn-legenda-cat").onclick=abrirLegendaCategorias;
  $("#add-horas").onclick=()=>formHoras();
  $("#csv-modelo").onclick=()=>baixarModeloCSV();
  $("#csv-import").onclick=()=>$("#csv-file").click();
  $("#csv-file").onchange=(e)=>importarCSVHoras(e);
  
  if(!getInternos().length||!DB.data.projetos.length){
    v.innerHTML=`<div class="card"><div class="empty"><span class="ic">◷</span>
      <h3>Pré-requisitos</h3><p>Para apontar horas, cadastre primeiro a <b>equipe interna</b> e ao menos um <b>projeto</b>.</p></div></div>`;
    return;
  }
  
  ST.search.horas = ST.search.horas || {mes:"", colab:"", proj:"", de:"", ate:"", selecionados: []};
  const f = ST.search.horas;
  const myId = currentColabId();
  let lista = DB.data.horas.slice();
  if(myId) lista = lista.filter(h=>h.colaboradorId===myId);
  if(f.mes) lista = lista.filter(h=>monthKey(h.data)===f.mes);
  if(f.colab && !myId) lista = lista.filter(h=>h.colaboradorId===f.colab);
  if(f.proj) lista = lista.filter(h=>h.projetoId===f.proj);
  if(f.de) lista = lista.filter(h=>h.data && h.data>=f.de);
  if(f.ate) lista = lista.filter(h=>h.data && h.data<=f.ate);
  lista.sort((a,b)=>(b.data||"").localeCompare(a.data||""));

  const totalH = lista.reduce((s,h)=>s+(+h.horas||0),0);
  const meses = [...new Set(DB.data.horas.map(h=>monthKey(h.data)).filter(Boolean))].sort().reverse();

  // Função para verificar se todos os itens visíveis estão selecionados
  const todosSelecionados = lista.length > 0 && lista.every(h => f.selecionados.includes(h.id));
  const temSelecionados = f.selecionados.length > 0;

  const rows = lista.map(h => {
    const checked = f.selecionados.includes(h.id) ? 'checked' : '';
    return `<tr>
      <td style="width:36px;text-align:center">
        <input type="checkbox" class="hora-checkbox" data-id="${h.id}" ${checked}>
      </td>
      <td style="font-size:12px">${fmtDate(h.data)}</td>
      <td style="font-weight:600">${esc(nomeColab(h.colaboradorId))}</td>
      <td>${esc(nomeProjeto(h.projetoId))}</td>
      <td>${h.atividadeId?esc(nomeAtividade(h.atividadeId)):'<span style="color:var(--ink-faint)">—</span>'}</td>
      <td><span class="tag" style="background:${corCategoria(h.categoriaId)}22;color:${corCategoria(h.categoriaId)}">${esc(nomeCategoria(h.categoriaId))}</span></td>
      <td class="num" style="font-weight:600">${fmtH(h.horas)}</td>
      <td class="actions">
        <button class="btn-icon" data-edh="${h.id}">✎</button>
        <button class="btn-icon del" data-dlh="${h.id}">🗑</button>
      </td></tr>`;
  }).join("");

  v.innerHTML=`
  ${myId?`<div class="help-banner" style="background:var(--accent-soft);border-color:#bcdcd9;color:#1f6f6b"><span>👤</span><span>Você está vendo apenas <b>seus próprios apontamentos</b>.</span></div>`:""}
  <div class="toolbar">
    <div class="field-inline">Mês
      <select class="select" id="f-mes"><option value="">Todos</option>
        ${meses.map(m=>`<option value="${m}" ${f.mes===m?"selected":""}>${mesLabel(m)}</option>`).join("")}</select></div>
    ${myId?"":`<div class="field-inline">Colaborador
      <select class="select" id="f-colab"><option value="">Todos</option>
        ${getInternos().map(c=>`<option value="${c.id}" ${f.colab===c.id?"selected":""}>${esc(c.nome)}</option>`).join("")}</select></div>`}
    <div class="field-inline">Projeto
      <select class="select" id="f-proj"><option value="">Todos</option>
        ${DB.data.projetos.map(p=>`<option value="${p.id}" ${f.proj===p.id?"selected":""}>${esc(p.nome)}</option>`).join("")}</select></div>
    <div class="field-inline">De
      <input type="date" class="select" id="f-de" value="${esc(f.de||"")}"></div>
    <div class="field-inline">Até
      <input type="date" class="select" id="f-ate" value="${esc(f.ate||"")}"></div>
    ${(f.de||f.ate)?'<button class="btn ghost sm" id="f-clr-data">Limpar datas</button>':""}
    <div class="spacer"></div>
    <span class="field-inline">Total filtrado: <b style="color:var(--ink)">${fmtH(totalH)}</b></span>
  </div>
  
  <div class="toolbar" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line-soft)">
    <div class="field-inline">
      <input type="checkbox" id="select-all-horas" ${todosSelecionados ? 'checked' : ''}>
      <label for="select-all-horas" style="cursor:pointer;font-weight:500">Selecionar todos</label>
    </div>
    <div class="field-inline" style="color:var(--ink-soft)">
      ${temSelecionados ? `${f.selecionados.length} selecionado(s)` : 'Nenhum selecionado'}
    </div>
    <div class="spacer"></div>
    ${temSelecionados ? `<button class="btn danger" id="delete-selected">🗑 Excluir selecionados (${f.selecionados.length})</button>` : ''}
    ${temSelecionados ? `<button class="btn ghost sm" id="clear-selection">✕ Limpar seleção</button>` : ''}
  </div>
  
  ${lista.length?`<div class="card table-wrap"><table><thead><tr>
    <th style="width:36px">#</th>
    <th>Data</th><th>Colaborador</th><th>Projeto</th><th>Atividade</th><th>Categoria</th>
    <th class="num">Horas</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`
   :`<div class="card"><div class="empty"><span class="ic">◷</span><h3>Nenhum apontamento</h3>
     <p>Registre as horas executadas pela equipe nas atividades dos projetos.</p>
     <button class="btn" id="ah2">+ Apontar horas</button></div></div>`}`;

  // --- EVENTOS ---
  
  // Filtros
  $("#f-mes").onchange=e=>{ f.mes=e.target.value; f.selecionados=[]; viewHoras(v); };
  if($("#f-colab")) $("#f-colab").onchange=e=>{ f.colab=e.target.value; f.selecionados=[]; viewHoras(v); };
  $("#f-proj").onchange=e=>{ f.proj=e.target.value; f.selecionados=[]; viewHoras(v); };
  $("#f-de").onchange=e=>{ f.de=e.target.value; f.selecionados=[]; viewHoras(v); };
  $("#f-ate").onchange=e=>{ f.ate=e.target.value; f.selecionados=[]; viewHoras(v); };
  if($("#f-clr-data")) $("#f-clr-data").onclick=()=>{ f.de=""; f.ate=""; f.selecionados=[]; viewHoras(v); };
  
  // Checkbox individual
  v.querySelectorAll(".hora-checkbox").forEach(cb => {
    cb.onchange = function() {
      const id = this.dataset.id;
      if (this.checked) {
        if (!f.selecionados.includes(id)) f.selecionados.push(id);
      } else {
        f.selecionados = f.selecionados.filter(x => x !== id);
      }
      viewHoras(v); // Re-renderiza para atualizar contadores
    };
  });
  
  // Selecionar todos
  const selectAll = document.getElementById('select-all-horas');
  if (selectAll) {
    selectAll.onchange = function() {
      if (this.checked) {
        f.selecionados = lista.map(h => h.id);
      } else {
        f.selecionados = [];
      }
      viewHoras(v);
    };
  }
  
  // Limpar seleção
  const clearBtn = document.getElementById('clear-selection');
  if (clearBtn) {
    clearBtn.onclick = function() {
      f.selecionados = [];
      viewHoras(v);
    };
  }
  
  // Excluir selecionados
  const deleteBtn = document.getElementById('delete-selected');
  if (deleteBtn) {
    deleteBtn.onclick = function() {
      if (f.selecionados.length === 0) return;
      const count = f.selecionados.length;
      confirmar(
        `Excluir ${count} apontamento(s) de horas?`,
        `Esta ação é irreversível. ${count} registro(s) serão removidos definitivamente do banco de dados.`,
        async () => {
          try {
            // Pega os IDs selecionados
            const idsParaExcluir = [...f.selecionados];
            
            // Remove do banco de dados um por um (ou em lote)
            for (const id of idsParaExcluir) {
              await sbDelete("horas", id);
            }
            
            // Remove da memória
            DB.data.horas = DB.data.horas.filter(h => !idsParaExcluir.includes(h.id));
            
            // Limpa a seleção
            f.selecionados = [];
            
            toast(`${idsParaExcluir.length} apontamento(s) excluído(s) com sucesso.`);
            render(); // Recarrega a página
          } catch (error) {
            console.error("Erro ao excluir em lote:", error);
            toast("Erro ao excluir: " + (error.message || error));
            
          }
        }
      );
    };
  }
  
  // Exportar CSV
  if($("#csv-export")) $("#csv-export").onclick=()=>exportarHorasCSV(lista);
  
  // Botão "Apontar horas" (dentro do empty state)
  if($("#ah2")) $("#ah2").onclick=()=>formHoras();
  
  // Botões de edição/exclusão individual
  v.querySelectorAll("[data-edh]").forEach(b=>b.onclick=()=>{
    const x=DB.data.horas.find(y=>y.id===b.dataset.edh);
    if(myId && x.colaboradorId!==myId){ toast("Você só pode editar seus próprios apontamentos."); return; }
    formHoras(x);
  });
  v.querySelectorAll("[data-dlh]").forEach(b=>b.onclick=()=>{
    const x=DB.data.horas.find(y=>y.id===b.dataset.dlh);
    if(myId && x.colaboradorId!==myId){ toast("Você só pode excluir seus próprios apontamentos."); return; }
    confirmar("Excluir este apontamento de horas?","",async()=>{
      const hid=b.dataset.dlh;
      DB.data.horas=DB.data.horas.filter(x=>x.id!==hid);
      await sbDelete("horas", hid);
      toast("Apontamento excluído.");
      // Remove da seleção se estiver lá
      f.selecionados = f.selecionados.filter(id => id !== hid);
      render();
    });
  });
}
function mesLabel(mk){ if(!mk) return ""; const p=mk.split("-"); return MONTHS[(+p[1])-1]+"/"+p[0]; }

/* ============================================================
   VIEW: OCUPAÇÃO DA EQUIPE (GLOBAL, por colaborador)
   Cruza TODAS as atividades com horas previstas de TODOS os projetos do
   portfólio e mostra, por colaborador: quantas horas por dia estão
   dedicadas a cada projeto, e quantas horas ainda estão livres na agenda.
   Um colaborador só enxerga a própria ocupação; o gestor pode escolher
   qualquer pessoa da equipe.
   ============================================================ */
function viewOcupacaoEquipe(v){
  const myId = currentColabId();
  const pessoas = myId
    ? [getColab(myId)].filter(Boolean)
    : DB.data.colaboradores.slice().sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR",{sensitivity:"base"}));

  if(!pessoas.length){
    v.innerHTML=`<div class="card"><div class="empty"><span class="ic">▥</span>
      <h3>Nenhum colaborador identificado</h3>
      <p>${myId?"Seu cadastro de colaborador não foi encontrado.":"Cadastre a equipe em Operação → Equipe para ver a ocupação."}</p></div></div>`;
    return;
  }
  if(!DB.data.atividades.some(a=>(+a.horasPrevistas||0)>0)){
    v.innerHTML=`<div class="help-banner"><span>ℹ️</span><span>
      A ocupação é calculada a partir das <b>horas previstas</b> das atividades de cada projeto
      (campo preenchido no Cronograma Físico). O Responsável e cada pessoa marcada como "R" na
      Matriz RACI recebem essa quantidade INTEIRA de horas (sem dividir entre eles), distribuída
      ao longo dos dias úteis entre início e término previstos.</span></div>
      <div class="card"><div class="empty"><span class="ic">🕐</span>
      <h3>Ainda não há horas previstas lançadas</h3>
      <p>Preencha "Horas previstas" nas atividades dos projetos do portfólio para que este painel
      seja calculado automaticamente.</p></div></div>`;
    return;
  }

  ST.ocupEqPessoaId = myId || ((ST.ocupEqPessoaId && pessoas.some(p=>p.id===ST.ocupEqPessoaId)) ? ST.ocupEqPessoaId : pessoas[0].id);
  ST.ocupEqMes = ST.ocupEqMes || todayStr().slice(0,7);

  const pessoa = getColab(ST.ocupEqPessoaId);
  const mapa = construirMapaOcupacaoGlobal();
  const resumo = resumoOcupacaoPessoaMes(pessoa.id, ST.ocupEqMes, mapa);
  const pctOcupado = resumo.capacidadeTotalMes>0 ? Math.round((resumo.horasTotalMes/resumo.capacidadeTotalMes)*100) : 0;

  const projData = Object.keys(resumo.porProjeto).map((pid,i)=>({
    label: resumo.porProjeto[pid].nome, value: resumo.porProjeto[pid].horas, color: PALETTE[i%PALETTE.length]
  })).sort((a,b)=>b.value-a.value);

  const hojeStr = todayStr();
  const hojeDow = new Date(hojeStr+"T00:00:00").getDay();
  const detalheHoje = (hojeDow!==0 && hojeDow!==6) ? detalheOcupacaoDia(pessoa.id, hojeStr) : [];
  const totalHoje = detalheHoje.reduce((s,d)=>s+d.horas,0);
  const livreHoje = Math.max(0, CAPACIDADE_DIARIA_PADRAO-totalHoje);
  const hojeHtml = (hojeDow===0||hojeDow===6)
    ? `<p style="color:var(--ink-faint);font-size:12.5px">Hoje é fim de semana — sem apontamento previsto.</p>`
    : (detalheHoje.length
        ? detalheHoje.map(d=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px">
            <div><div style="font-weight:600">${esc(d.projetoNome)}</div><div style="color:var(--ink-faint)">${esc(d.atividadeNome)}</div></div>
            <div style="font-weight:700">${fmtH(d.horas)}</div></div>`).join("")
        : `<p style="color:var(--ink-faint);font-size:12.5px">Nenhuma alocação prevista para hoje.</p>`)
      +`<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:12.5px">
          <div style="font-weight:700;color:${livreHoje>0?"var(--ok)":"var(--ink-faint)"}">Horas livres hoje</div>
          <div style="font-weight:700;color:${livreHoje>0?"var(--ok)":"var(--ink-faint)"}">${fmtH(livreHoje)}</div></div>`;

  const projBreakdownHtml = projData.length
    ? `<div class="grid" style="grid-template-columns:1fr 1fr;gap:18px;align-items:center">
        ${donutChart(projData)}
        <div>${projData.map(d=>{
          const pct = resumo.capacidadeTotalMes>0 ? Math.round((d.value/resumo.capacidadeTotalMes)*100) : 0;
          return `<div style="margin-bottom:9px">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px">
              <span style="font-weight:600"><span class="sw" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:5px"></span>${esc(d.label)}</span>
              <span>${fmtH(d.value)}</span></div>
            <div style="background:var(--line-soft);border-radius:5px;height:6px;overflow:hidden">
              <div style="background:${d.color};width:${Math.min(100,pct)}%;height:100%"></div></div>
          </div>`;
        }).join("")}</div>
      </div>`
    : `<div class="empty" style="padding:20px"><span class="ic">▱</span><p>Sem horas alocadas em nenhum projeto neste mês.</p></div>`;

  const calendarHtml = calendarioOcupacaoHtml(pessoa, ST.ocupEqMes, mapa);

  v.innerHTML=`
  <div class="help-banner"><span>ℹ️</span><span>
    Visão consolidada de <b>todos os projetos do portfólio</b> em que ${myId?"você está":"a pessoa está"} alocada.
    As horas vêm das <b>horas previstas</b> das atividades (Cronograma Físico de cada projeto): o Responsável e
    cada pessoa marcada como "R" na RACI recebem essa quantidade INTEIRA de horas (sem dividir entre eles),
    distribuída pelos dias úteis entre início e término previstos. Capacidade considerada:
    <b>${CAPACIDADE_DIARIA_PADRAO}h/dia</b>.</span></div>

  <div class="toolbar">
    ${myId?"":`<div class="field-inline">Colaborador
      <select class="select" id="ocupeq-pessoa">${pessoas.map(pe=>`<option value="${pe.id}" ${pessoa.id===pe.id?"selected":""}>${esc(pe.nome)}</option>`).join("")}</select></div>`}
    <div class="spacer"></div>
    <div class="field-inline">Mês
      <select class="select" id="ocupeq-mes">${mesesOcupacaoDisponiveis().map(mk=>`<option value="${mk}" ${ST.ocupEqMes===mk?"selected":""}>${esc(mesLabel(mk))}</option>`).join("")}</select></div>
  </div>

  <div class="grid g4" style="margin-bottom:20px">
    <div class="card kpi"><div class="lbl"><span class="dot" style="background:var(--accent)"></span>Horas previstas no mês</div>
      <div class="val">${fmtH(resumo.horasTotalMes)}</div><div class="sub">${pctOcupado}% da capacidade do mês</div></div>
    <div class="card kpi"><div class="lbl"><span class="dot" style="background:var(--ok)"></span>Horas livres no mês</div>
      <div class="val">${fmtH(resumo.horasLivres)}</div><div class="sub">ainda não alocadas no calendário</div></div>
    <div class="card kpi"><div class="lbl"><span class="dot" style="background:${resumo.horasExcedentes>0?"var(--danger)":"var(--ink-faint)"}"></span>Horas excedentes</div>
      <div class="val">${fmtH(resumo.horasExcedentes)}</div><div class="sub">acima de ${CAPACIDADE_DIARIA_PADRAO}h/dia em algum dia</div></div>
    <div class="card kpi"><div class="lbl"><span class="dot" style="background:var(--info)"></span>Capacidade do mês</div>
      <div class="val">${fmtH(resumo.capacidadeTotalMes)}</div><div class="sub">${resumo.diasUteisMes} dia(s) útil(eis)</div></div>
  </div>

  <div class="grid" style="grid-template-columns:1.4fr 1fr;gap:18px;align-items:start;margin-bottom:20px">
    <div class="card">
      <div class="card-head"><h3>Horas por projeto no mês</h3></div>
      <div class="card-pad">${projBreakdownHtml}</div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Hoje · ${fmtDate(hojeStr)}</h3></div>
      <div class="card-pad">${hojeHtml}</div>
    </div>
  </div>

  <div class="section-title">Calendário de ocupação</div>
  <div class="card"><div class="card-pad">${calendarHtml}</div></div>`;

  if($("#ocupeq-pessoa")) $("#ocupeq-pessoa").onchange=e=>{ ST.ocupEqPessoaId=e.target.value; render(); };
  if($("#ocupeq-mes")) $("#ocupeq-mes").onchange=e=>{ ST.ocupEqMes=e.target.value; render(); };
  if($("#ocal-prev")) $("#ocal-prev").onclick=()=>{ ST.ocupEqMes=mesShift(ST.ocupEqMes,-1); render(); };

    <div class="card kpi"><div class="lbl">Receitas (filtro)</div><div class="val" style="font-size:21px;color:var(--ok)">${fmtBRL(receitas)}</div></div>
    <div class="card kpi"><div class="lbl">Despesas (filtro)</div><div class="val" style="font-size:21px;color:var(--danger)">${fmtBRL(despesas)}</div></div>
    <div class="card kpi"><div class="lbl">Saldo (filtro)</div><div class="val" style="font-size:21px;color:${receitas-despesas<0?"var(--danger)":"var(--ink)"}">${fmtBRL(receitas-despesas)}</div></div>
  </div>
  <div style="height:18px"></div>
  <div class="toolbar">
    <div class="field-inline">Projeto<select class="select" id="ff-proj"><option value="">Todos</option>
      ${DB.data.projetos.map(p=>`<option value="${p.id}" ${f.proj===p.id?"selected":""}>${esc(p.nome)}</option>`).join("")}</select></div>
    <div class="field-inline">Tipo<select class="select" id="ff-tipo"><option value="">Todos</option>
      <option value="receita" ${f.tipo==="receita"?"selected":""}>Receita</option>
      <option value="despesa" ${f.tipo==="despesa"?"selected":""}>Despesa</option></select></div>
    <div class="field-inline">Situação<select class="select" id="ff-status"><option value="">Todas</option>
      <option value="previsto" ${f.status==="previsto"?"selected":""}>Previsto</option>
      <option value="realizado" ${f.status==="realizado"?"selected":""}>Realizado</option></select></div>
  </div>
  ${lista.length?`<div class="card table-wrap"><table><thead><tr>
    <th>Data</th><th>Projeto</th><th>Tipo</th><th>Descrição / Rubrica</th><th>Situação</th>
    <th class="num">Valor</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`

     <button class="btn" id="nf2">+ Novo lançamento</button></div></div>`}`;

  $("#ff-tipo").onchange=e=>{ f.tipo=e.target.value; viewFinanceiro(v); };
  $("#ff-status").onchange=e=>{ f.status=e.target.value; viewFinanceiro(v); };

    const x=DB.data.financeiro.find(y=>y.id===b.dataset.edf); formFinanceiro(x.projetoId,x);
  });
  v.querySelectorAll("[data-dlf]").forEach(b=>b.onclick=()=>{

      <div class="card-head"><h3>Equipe interna <span class="tag" style="margin-left:6px">${internos.length}</span></h3>

        :`<div style="padding:24px;color:var(--ink-faint);font-size:13px;text-align:center">Nenhum colaborador interno.</div>`}
    </div>
    <div class="card">
      <div class="card-head"><h3>Parceiros externos <span class="tag" style="margin-left:6px;background:#f3ead7;color:#b8852a">${parceiros.length}</span></h3>
        <span class="hint">Participam da RACI · sem remuneração · sem acesso ao app</span></div>
      ${parceiros.length?`<div class="table-wrap"><table><thead>${headers}</thead>
        <tbody>${rowsFor(parceiros)}</tbody></table></div>`

  if(btnSync) btnSync.onclick=async()=>{

    try{

      const profiles = await sbFetch("profiles?select=id");

      // se o próprio usuário logado não tem profile, cria
      if(session && !idsComProfile.has(session.user.id)){
        const nome=session.user.user_metadata?.nome||session.user.email?.split("@")[0]||"Usuário";

    const ehInterno = c.tipo!=="parceiro";
    const msg = ehInterno
      ? "Isto remove o acesso da pessoa ao app por completo (login revogado). Apontamentos de horas já feitos serão mantidos."
      : "Apontamentos de horas e referências em RACI serão mantidos.";
    confirmar(`Remover "${c.nome}"?`, msg, async()=>{
      if(ehInterno){
        const ok = await removerUsuarioCompleto(c.id);
        if(!ok) return; // erro já avisado dentro da função
      } else {
        await sbDelete("profiles", c.id);
      }
      DB.data.colaboradores=DB.data.colaboradores.filter(x=>x.id!==c.id);
      toast("Removido."); render();
    });
  });
}

/* Chama a Edge Function que revoga o login (auth.users) de verdade,
   além de apagar o perfil. Retorna true se deu certo. */
async function removerUsuarioCompleto(userId){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/delete-user`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ userId })
    });
    const body = await resp.json();
    if(!resp.ok){
      toast("Erro ao remover: " + (body.error||"falha desconhecida"));
      return false;
    }
    return true;
  }catch(e){
    toast("Não foi possível contatar o servidor para remover o acesso.");
    return false;
  }
}

/* Detecta registros "órfãos": linhas que referenciam um projeto, atividade
   ou pessoa que não existe mais. Isso não deveria acontecer em uso normal
   (o banco tem ON DELETE CASCADE/SET NULL para isso), mas pode sobrar lixo
   de importações de backup antigas ou de uma falha pontual no passado. */
function detectarOrfaos(){
  const atividadeIds=new Set(DB.data.atividades.map(a=>a.id));
  const projetoIds=new Set(DB.data.projetos.map(p=>p.id));
  const colabIds=new Set(DB.data.colaboradores.map(c=>c.id));

  const horasSemProjeto=DB.data.horas.filter(h=>h.projetoId && !projetoIds.has(h.projetoId));
  const horasAtividadeInvalida=DB.data.horas.filter(h=>h.atividadeId && !atividadeIds.has(h.atividadeId) && !horasSemProjeto.includes(h));
  const financeiroSemProjeto=DB.data.financeiro.filter(f=>f.projetoId && !projetoIds.has(f.projetoId));

  const raciOrfaos=[];
  DB.data.projetos.forEach(p=>{
    Object.entries(p.raci||{}).forEach(([atividadeId,pessoas])=>{
      Object.keys(pessoas||{}).forEach(pessoaId=>{
        if(!atividadeIds.has(atividadeId)||!colabIds.has(pessoaId)){
          raciOrfaos.push({projetoId:p.id, atividadeId, pessoaId});
        }
      });
    });
  });

  const total=horasSemProjeto.length+horasAtividadeInvalida.length+financeiroSemProjeto.length+raciOrfaos.length;
  return {horasSemProjeto,horasAtividadeInvalida,financeiroSemProjeto,raciOrfaos,total};
}

async function excluirOrfaosDetectados(rel){
  for(const h of rel.horasSemProjeto){
    await sbDelete("horas", h.id);
    DB.data.horas=DB.data.horas.filter(x=>x.id!==h.id);
  }
  for(const h of rel.horasAtividadeInvalida){
    await sbUpdate("horas", h.id, {atividade_id:null}); // mantém a hora, só remove o vínculo quebrado
    const local=DB.data.horas.find(x=>x.id===h.id);
    if(local) local.atividadeId=null;
  }
  for(const f of rel.financeiroSemProjeto){
    await sbDelete("financeiro", f.id);
    DB.data.financeiro=DB.data.financeiro.filter(x=>x.id!==f.id);
  }
  for(const r of rel.raciOrfaos){
    await sbDeleteWhere("raci", qsEq("atividade_id",r.atividadeId)+"&"+qsEq("pessoa_id",r.pessoaId));
    const p=getProjeto(r.projetoId);
    if(p && p.raci && p.raci[r.atividadeId]) delete p.raci[r.atividadeId][r.pessoaId];
  }
  return rel.total;
}

function abrirModalManutencao(){
  const rel=detectarOrfaos();
  const linhas=[
    ["Apontamentos de horas apontando para um projeto que não existe mais", rel.horasSemProjeto.length, "excluídos"],
    ["Apontamentos de horas com vínculo de atividade quebrado", rel.horasAtividadeInvalida.length, "vínculo removido (a hora em si é mantida)"],
    ["Lançamentos financeiros apontando para um projeto que não existe mais", rel.financeiroSemProjeto.length, "excluídos"],
    ["Atribuições da matriz RACI apontando para atividade/pessoa inexistente", rel.raciOrfaos.length, "excluídas"]
  ];
  const corpo=rel.total===0
    ? `<div class="empty" style="padding:20px"><span class="ic">✓</span><p>Nenhum dado órfão encontrado. Seu banco só tem registros realmente em uso.</p></div>`
    : `<table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr style="background:#f4f7f8">
          <th style="text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)">O que foi encontrado</th>
          <th style="text-align:right;padding:7px 9px;border-bottom:1px solid var(--line)">Qtde.</th>
        </tr></thead>
        <tbody>${linhas.filter(l=>l[1]>0).map(l=>`<tr>
          <td style="padding:7px 9px;border-bottom:1px solid var(--line-soft)">${esc(l[0])}<div style="color:var(--ink-faint);font-size:11px">Ação: ${esc(l[2])}</div></td>
          <td style="padding:7px 9px;text-align:right;border-bottom:1px solid var(--line-soft);font-weight:700">${l[1]}</td>
        </tr>`).join("")}</tbody>
      </table>`;
  $("#modal-root").innerHTML=`
  <div class="overlay"><div class="modal">
    <div class="modal-head"><h3>🧹 Manutenção do banco de dados</h3>
      <button class="btn-icon" id="mm-x">✕</button></div>
    <div class="modal-body">${corpo}</div>
    <div class="modal-foot">
      <button class="btn ghost" id="mm-cancel">Fechar</button>
      ${rel.total>0?'<button class="btn danger" id="mm-purge">🗑 Excluir órfãos definitivamente</button>':""}
    </div></div></div>`;
  $("#mm-x").onclick=closeModal;
  $("#mm-cancel").onclick=closeModal;
  if($("#mm-purge")) $("#mm-purge").onclick=async()=>{
    const btn=$("#mm-purge");
    btn.disabled=true; btn.textContent="Excluindo...";
    try{
      const n=await excluirOrfaosDetectados(rel);
      closeModal();
      toast(`${n} registro(s) órfão(s) tratado(s) — banco limpo.`);
      render();
    }catch(e){
      console.error(e);
      toast("Erro ao limpar: "+(e.message||e));
      btn.disabled=false; btn.textContent="🗑 Excluir órfãos definitivamente";
    }
  };
}

/* ---- SINCRONIZAÇÃO: extrai dados do Apontamento de Horas para o
   cronograma (atividades) e para os stakeholders de cada projeto.
   Só completa campos vazios — nunca sobrescreve o que já foi preenchido.
   O campo responsavelId NÃO é mais atualizado — a responsabilidade é
   derivada da Matriz RACI. ---- */
async function sincronizarApontamentoHoras(){
  let atividadesAtualizadas=0;
  let stakeholdersAdicionados=0;

  // 1) Backfill de atividades a partir das horas já apontadas
  for(const a of DB.data.atividades){
    const horasDaAtividade=DB.data.horas.filter(h=>h.atividadeId===a.id);
    if(!horasDaAtividade.length) continue;

    const patch={};
    const datas=horasDaAtividade.map(h=>h.data).filter(Boolean).sort();

    // início previsto = data mais antiga apontada, se ainda não definido
    if(!a.dataInicioPrev && datas.length) patch.dataInicioPrev=datas[0];

    // término previsto = data mais recente apontada, só quando a atividade já
    // está marcada como concluída e ainda não tem data de término definida
    if(!a.dataFimPrev && a.status==="Concluída" && datas.length) patch.dataFimPrev=datas[datas.length-1];

    // situação: se ainda "Não iniciada" mas já tem horas apontadas, passa para "Em andamento"
    if(a.status==="Não iniciada") patch.status="Em andamento";

    if(Object.keys(patch).length){
      Object.assign(a,patch);
      await sbUpdate("atividades", a.id, toSnake(patch));
      atividadesAtualizadas++;
    }
  }

  // 2) Adiciona como stakeholders os colaboradores que apontaram horas em cada projeto
  for(const p of DB.data.projetos){
    p.stakeholders=p.stakeholders||[];
    const colabIdsDoProjeto=new Set(
      DB.data.horas.filter(h=>h.projetoId===p.id).map(h=>h.colaboradorId)
    );
    for(const colabId of colabIdsDoProjeto){
      const colab=getColab(colabId);
      if(!colab) continue;
      const jaExiste=p.stakeholders.some(s=>
        (s.nome||"").trim().toLowerCase()===(colab.nome||"").trim().toLowerCase()
      );
      if(jaExiste) continue;
      const novoStakeholder={
        id:uid(), projetoId:p.id, nome:colab.nome,
        papel:"Equipe interna (apontamento de horas)",
        organizacao:colab.organizacao||"",
        influencia:"Média",
        contato:colab.email||"",
        classificacao:"Secundário"
      };
      p.stakeholders.push(novoStakeholder);
      await sbInsert("stakeholders", toSnake(novoStakeholder));
      stakeholdersAdicionados++;
    }
  }

  await DB.load();
  render();
  toast(`Sincronização concluída: ${atividadesAtualizadas} atividade(s) atualizada(s), ${stakeholdersAdicionados} stakeholder(s) adicionado(s).`);
}

function exportarAta(p,r){
  const html=gerarHtmlAta(p,r);

function modalExportar(titulo,htmlConteudo,textoConteudo,nomeArquivo){
  $("#modal-root").innerHTML=`
  <div class="overlay"><div class="modal wide">
    <div class="modal-head"><h3>${esc(titulo)}</h3>
      <button class="btn-icon" id="mx-x">✕</button></div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="btn" id="mx-html">💾 Baixar arquivo (.html)</button>
        <button class="btn ghost" id="mx-open">🖨️ Abrir em nova aba (imprimir / salvar PDF)</button>
        <button class="btn ghost" id="mx-text">📋 Copiar como texto</button>
      </div>
      <div class="help-banner" style="margin-bottom:14px"><span>💡</span><span>O arquivo HTML pode ser anexado a e-mails ou aberto direto no navegador pelo destinatário. Para virar PDF, clique em "Abrir em nova aba" e use <b>Ctrl+P → Salvar como PDF</b>.</span></div>
      <div style="max-height:55vh;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fafbfc">
        ${htmlConteudo}
      </div>
    </div>
  </div></div>`;
  function montarStandalone(){
    return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>${esc(titulo)}</title></head><body style="background:#fff;margin:0;padding:18px 0">${htmlConteudo}</body></html>`;
  }
  $("#mx-x").onclick=closeModal;
  $("#mx-html").onclick=()=>{
    const blob=new Blob([montarStandalone()],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=nomeArquivo+".html";
    a.click(); URL.revokeObjectURL(a.href);
    toast("Arquivo baixado.");
  };
  $("#mx-open").onclick=()=>{
    const w=window.open("","_blank");
    if(!w){ toast("Permita pop-ups neste site para abrir em nova aba."); return; }
    w.document.write(montarStandalone()); w.document.close();
  };
  $("#mx-text").onclick=()=>{
    function copiarFallback(){
      const ta=document.createElement("textarea");
      ta.value=textoConteudo;
      ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); toast("Texto copiado."); }
      catch(e){ toast("Use Ctrl+C para copiar."); }
      document.body.removeChild(ta);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(textoConteudo)
        .then(()=>toast("Texto copiado para a área de transferência."), copiarFallback);
    } else copiarFallback();
  };
}

function gerarTextoAta(p,r){
  const ata=r.ata||{};
  const parts=(r.participantes||[]).filter(Boolean);
  let out="ATA DE REUNIÃO\n";
  out+="Projeto: "+p.nome+"\n";
  out+="=".repeat(50)+"\n\n";
  out+="Data: "+fmtDate(r.data)+(r.hora?" · "+r.hora:"")+"\n";
  out+="Assunto: "+(r.titulo||"(sem título)")+"\n";
  out+="Participantes: "+(parts.join(", ")||"—")+"\n\n";
  out+="OBJETIVO\n"+"-".repeat(8)+"\n"+(ata.objetivo||"—")+"\n\n";
  out+="TÓPICOS DE DISCUSSÃO\n"+"-".repeat(20)+"\n";
  if((ata.topicos||[]).length){
    ata.topicos.forEach((t,i)=>{
      out+=(i+1)+". "+(t.tema||"(sem tema)")+"\n";
      if(t.notas) out+="   "+String(t.notas).replace(/\n/g,"\n   ")+"\n";
      out+="\n";
    });
  } else out+="Nenhum tópico registrado.\n\n";
  out+="SAÍDAS E ENTREGAS ACORDADAS\n"+"-".repeat(27)+"\n";
  if((ata.saidas||[]).length){
    ata.saidas.forEach(s=>{
      out+="• "+(s.descricao||"—")+"\n";
      out+="  Responsável: "+(s.responsavel||"—")+"\n";
      out+="  Data prevista: "+(s.dataEntrega?fmtDate(s.dataEntrega):"—")+"\n\n";
    });
  } else out+="Nenhuma entrega registrada.\n\n";
  out+="—\nGerado em "+fmtDate(todayStr())+" pelo aplicativo de Gestão de Portfólio.";
  return out;
}

  out+="\n";
  const reuns=(p.reunioes||[]).slice().sort((a,b)=>(a.data||"").localeCompare(b.data||""));

    out+="REUNIÕES REGISTRADAS\n"+"-".repeat(20)+"\n";

      out+="• "+(r.descricao||"—")+" — Severidade: "+severidadeRisco(r)+"\n";

  }
  out+="—\nRelatório gerado em "+fmtDate(todayStr())+" por "+nomeUsuarioAtual();

function decodeCsvBuffer(buffer){
  // O Excel, no Brasil, ao salvar como "CSV (separado por vírgulas)" comum
  // (em vez de "CSV UTF-8"), grava o arquivo em Windows-1252/ANSI, não em
  // UTF-8. Se a gente sempre ler como UTF-8, todo caractere acentuado
  // (á,ã,ç,é...) vira lixo ou é corrompido silenciosamente, e as
  // comparações de nome/categoria passam a falhar mesmo com o cadastro
  // certo. Aqui a gente tenta decodificar como UTF-8 estrito primeiro; se
  // falhar (sequência de bytes inválida para UTF-8), cai para Windows-1252.
  try{
    const decoderUtf8=new TextDecoder("utf-8",{fatal:true});
    return { texto: decoderUtf8.decode(buffer), encoding:"utf-8" };
  }catch(e){
    const decoderAnsi=new TextDecoder("windows-1252");
    return { texto: decoderAnsi.decode(buffer), encoding:"windows-1252" };
  }
}

function importarCSVHoras(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const { texto:textoDecodificado, encoding } = decodeCsvBuffer(e.target.result);
      console.log("[PMO] CSV decodificado como", encoding);
      const texto=textoDecodificado.replace(/^\uFEFF/,""); // remove BOM se houver
      const linhas=texto.split(/\r?\n/).filter(l=>l.trim());
      if(linhas.length<2){
        alert("CSV vazio ou sem dados. O arquivo deve ter cabeçalho + linhas com apontamentos."); return;
      }
      // detecta separador (; ou ,)
      const sep=linhas[0].includes(";")?";":",";
      const cabecalho=parseCSVLine(linhas[0],sep).map(s=>s.trim().toLowerCase());
      // mapeia colunas
      const cols={
        data: cabecalho.findIndex(c=>c==="data"||c==="date"),
        colab: cabecalho.findIndex(c=>c==="colaborador"||c==="colaboradora"||c==="usuário"||c==="usuario"),
        projeto: cabecalho.findIndex(c=>c==="projeto"),
        atividade: cabecalho.findIndex(c=>c==="atividade"),
        categoria: cabecalho.findIndex(c=>c==="categoria"),
        horas: cabecalho.findIndex(c=>c==="horas"||c==="h realizada"||c==="h"),
        obs: cabecalho.findIndex(c=>c==="observação"||c==="observacao"||c==="obs"||c==="descrição"||c==="descricao")
      };
      const obrigatorias=["data","projeto","atividade","categoria","horas"];
      const faltando=obrigatorias.filter(k=>cols[k]<0);
      if(faltando.length){
        alert("CSV inválido. Faltando coluna(s): "+faltando.join(", ")+".\n\nO cabeçalho deve ter: Data; Colaborador; Projeto; Atividade; Categoria; Horas; Observação."); return;
      }
      const myId=currentColabId();
      const resultado={ok:0, erro:0, novasAtividades:0, mensagens:[]};
      const novasAtividadesParaInserir=[];
      const novasHorasParaInserir=[];
      const linhasParaProcessar=linhas.slice(1);
      // usa for..of (em vez de forEach) porque o corpo precisa de "await" para
      // salvar o RACI da atividade nova; forEach nunca aguarda callbacks async,
      // e o "await" dentro de uma arrow function não-async é um erro de sintaxe
      // que impedia o navegador de sequer carregar o script inteiro.
      for(let idx=0; idx<linhasParaProcessar.length; idx++){
        const linha=linhasParaProcessar[idx];
        const lnNum=idx+2;
        if(!linha.trim()) continue;
        const c=parseCSVLine(linha,sep);
        const dataRaw=(c[cols.data]||"").trim();
        const colabRaw=(cols.colab>=0?(c[cols.colab]||""):"").trim();
        const projRaw=(c[cols.projeto]||"").trim();
        const ativRaw=(c[cols.atividade]||"").trim();
        const catRaw=(c[cols.categoria]||"").trim();
        const horasRaw=(c[cols.horas]||"").trim();
        const obsRaw=(cols.obs>=0?(c[cols.obs]||""):"").trim();

        // data: aceita DD/MM/YYYY ou YYYY-MM-DD
        let data="";
        const m1=dataRaw.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        const m2=dataRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(m1) data=`${m1[3]}-${m1[2]}-${m1[1]}`;
        else if(m2) data=dataRaw;
        else { resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: data inválida "${dataRaw}"`); continue; }
        // valida que é uma data real (não 99/99/2026 etc.)
        const dt=new Date(data+"T00:00:00");
        if(isNaN(dt.getTime()) || data.slice(0,7)!==dt.toISOString().slice(0,7)){
          resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: data inválida "${dataRaw}"`); continue;
        }

        // colaborador: prioridade ao logado (se for colaborador), senão usa coluna do CSV
        let colab=null;
        if(myId) colab=getColab(myId);
        else if(colabRaw){
          colab=getInternos().find(x=>(x.nome||"").trim().toLowerCase()===colabRaw.toLowerCase());
        }
        if(!colab){
          resultado.erro++;
          resultado.mensagens.push(`Linha ${lnNum}: colaborador "${colabRaw}" não encontrado.`);
          continue;
        }

        // projeto
        const proj=DB.data.projetos.find(p=>(p.nome||"").trim().toLowerCase()===projRaw.toLowerCase());
        if(!proj){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: projeto "${projRaw}" não cadastrado.`); continue; }

        // categoria
        const cat=DB.data.categorias.find(x=>(x.nome||"").trim().toLowerCase()===catRaw.toLowerCase());
        if(!cat){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: categoria "${catRaw}" não cadastrada.`); continue; }

        // horas: aceita vírgula ou ponto decimal
        const horas=parseFloat(horasRaw.replace(",","."))||0;
        if(horas<=0){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: horas inválidas "${horasRaw}".`); continue; }

        // atividade: existente ou cria nova
        let atividadeId=null;
        if(ativRaw){
          const existente=DB.data.atividades.find(a=>a.projetoId===proj.id &&
            (a.nome||"").trim().toLowerCase()===ativRaw.toLowerCase());
          if(existente) atividadeId=existente.id;
          else {
            const nova={id:uid(), projetoId:proj.id, nome:ativRaw, categoriaId:cat.id,
              progresso:0, status:"Em andamento",
              dataInicioPrev:data, dataFimPrev:null};
            DB.data.atividades.push(nova);
            atividadeId=nova.id;
            novasAtividadesParaInserir.push(nova);
            resultado.novasAtividades++;
            // também criar RACI para este colaborador
            await DB.salvarRaciCelula(proj.id, nova.id, colab.id, "R");
          }
        }

        const novaHora={
          id:uid(), data, colaboradorId:colab.id, projetoId:proj.id,
          atividadeId, categoriaId:cat.id, horas,
          descricao:obsRaw
        };
        DB.data.horas.push(novaHora);
        novasHorasParaInserir.push(novaHora);
        resultado.ok++;
      }

      if(novasAtividadesParaInserir.length)
        await sbInsert("atividades", novasAtividadesParaInserir.map(toSnake));
      if(novasHorasParaInserir.length)
        await sbInsert("horas", novasHorasParaInserir.map(toSnake));
      event.target.value=""; // permite reimportar o mesmo arquivo

      // exibe relatório
      const detalhes=resultado.mensagens.length
        ? `\n\nProblemas (${resultado.mensagens.length}):\n${resultado.mensagens.slice(0,15).join("\n")}${resultado.mensagens.length>15?"\n…":""}`
        : "";
      alert(`Importação concluída.\n\n` +
        `✓ ${resultado.ok} apontamento(s) importado(s).\n` +
        (resultado.novasAtividades?`✓ ${resultado.novasAtividades} atividade(s) criada(s) automaticamente no cronograma.\n`:"") +
        (resultado.erro?`✗ ${resultado.erro} linha(s) com erro (não importadas).`:"") + detalhes);
      render();
    } catch(err){
      alert("Erro ao ler o CSV: "+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCSVLine(linha, sep){
  // parser simples: respeita aspas duplas
  const out=[]; let buf=""; let dentroAspas=false;
  for(let i=0;i<linha.length;i++){
    const ch=linha[i];
    if(ch==='"'){
      if(dentroAspas && linha[i+1]==='"'){ buf+='"'; i++; }
      else dentroAspas=!dentroAspas;
    } else if(ch===sep && !dentroAspas){
      out.push(buf); buf="";
    } else { buf+=ch; }
  }
  out.push(buf);
  return out;
}

async function importarCSVCronograma(event, projetoId){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async (e)=>{
    try{
      const { texto:textoDecodificado, encoding } = decodeCsvBuffer(e.target.result);
      console.log("[PMO] CSV cronograma decodificado como", encoding);
      const texto=textoDecodificado.replace(/^\uFEFF/,"");
      const linhas=texto.split(/\r?\n/).filter(l=>l.trim());
      if(linhas.length<2){ alert("CSV vazio ou sem dados."); return; }
      const sep=linhas[0].includes(";")?";":",";
      const cabecalho=parseCSVLine(linhas[0],sep).map(s=>s.trim().toLowerCase());
      const cols={
        nome: cabecalho.findIndex(c=>c==="nome"||c==="atividade"||c==="descrição"||c==="descricao"),
        categoria: cabecalho.findIndex(c=>c==="categoria"),
        inicio: cabecalho.findIndex(c=>c==="início previsto"||c==="inicio previsto"||c==="início"||c==="inicio"||c==="data início"||c==="data inicio"),
        fim: cabecalho.findIndex(c=>c==="término previsto"||c==="termino previsto"||c==="término"||c==="termino"||c==="data fim"||c==="data fim"||c==="fim"),
        horas: cabecalho.findIndex(c=>c==="horas previstas"||c==="horas"||c==="h previstas"||c==="h"),
        status: cabecalho.findIndex(c=>c==="status"||c==="situação"||c==="situacao")
      };
      const obrigatorias=["nome","categoria"];
      const faltando=obrigatorias.filter(k=>cols[k]<0);
      if(faltando.length){
        alert("CSV inválido. Faltando coluna(s): "+faltando.join(", ")+".\n\nO cabeçalho deve ter: Nome; Categoria; Início previsto; Término previsto; Horas previstas; Status.");
        return;
      }
      const resultado={ok:0, erro:0, mensagens:[]};
      const novasAtividades=[];
      linhas.slice(1).forEach((linha,idx)=>{
        const lnNum=idx+2;
        if(!linha.trim()) return;
        const c=parseCSVLine(linha,sep);
        const nomeRaw=(c[cols.nome]||"").trim();
        const catRaw=(c[cols.categoria]||"").trim();
        const inicioRaw=(cols.inicio>=0?(c[cols.inicio]||"").trim():"").trim();
        const fimRaw=(cols.fim>=0?(c[cols.fim]||"").trim():"").trim();
        const horasRaw=(cols.horas>=0?(c[cols.horas]||"").trim():"").trim();
        const statusRaw=(cols.status>=0?(c[cols.status]||"").trim():"").trim();

        if(!nomeRaw){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: nome da atividade vazio.`); return; }
        const cat=DB.data.categorias.find(x=>(x.nome||"").trim().toLowerCase()===catRaw.toLowerCase());
        if(!cat){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: categoria "${catRaw}" não cadastrada.`); return; }

        // datas no formato DD/MM/YYYY ou YYYY-MM-DD
        function parseData(dataRaw){
          const m1=dataRaw.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
          const m2=dataRaw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if(m1) return `${m1[3]}-${m1[2]}-${m1[1]}`;
          if(m2) return dataRaw;
          return null;
        }
        const dataInicio=inicioRaw?parseData(inicioRaw):null;
        const dataFim=fimRaw?parseData(fimRaw):null;
        if(inicioRaw && !dataInicio){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: data de início inválida "${inicioRaw}"`); return; }
        if(fimRaw && !dataFim){ resultado.erro++; resultado.mensagens.push(`Linha ${lnNum}: data de término inválida "${fimRaw}"`); return; }

        const horasPrev=parseFloat(horasRaw.replace(",","."))||0;
        let status=statusRaw;
        if(status && !STATUS_ATIV.includes(status)) status="Não iniciada";

        const nova={id:uid(), projetoId, nome:nomeRaw, categoriaId:cat.id,
          dataInicioPrev:dataInicio||null, dataFimPrev:dataFim||null,
          horasPrevistas:horasPrev, status:status||"Não iniciada", progresso:0};
        DB.data.atividades.push(nova);
        novasAtividades.push(nova);
        resultado.ok++;
      });
      if(novasAtividades.length){
        await sbInsert("atividades", novasAtividades.map(toSnake));
        toast(`${novasAtividades.length} atividade(s) importada(s).`);
      }
      event.target.value="";
      const detalhes=resultado.mensagens.length
        ? `\n\nProblemas (${resultado.mensagens.length}):\n${resultado.mensagens.slice(0,15).join("\n")}${resultado.mensagens.length>15?"\n…":""}`
        : "";
      if(resultado.erro) alert(`Importação concluída.\n\n✓ ${resultado.ok} atividade(s) importada(s).\n✗ ${resultado.erro} linha(s) com erro (não importadas).`+detalhes);
      render();
    }catch(err){
      alert("Erro ao ler o CSV: "+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

   nuvem, então a importação ADICIONA o que estiver faltando (por id),
   em vez de sobrescrever tudo — assim não corre o risco de apagar dados
   que a equipe já tenha criado depois do backup. */
function importarBackup(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async()=>{
    let obj;
    try{
      obj=JSON.parse(reader.result);
      if(!obj||typeof obj!=="object") throw 0;
    }catch(err){
      toast("Arquivo inválido. Verifique o backup.");
      e.target.value=""; return;
    }

    confirmar(
      "Importar este backup?",
      "Projetos, categorias, rubricas, atividades, horas e lançamentos que ainda não existirem serão adicionados. Nada que já existe será sobrescrito ou removido.",
      async()=>{
        try{
          let novosTotal=0;
          const tabelasSimples=[
            ["categorias", obj.categorias],
            ["rubricas", obj.rubricas],
            ["projetos", (obj.projetos||[]).map(p=>{
              const {stakeholders,riscos,reunioes,raci,...rest}=p; return rest;
            })],
            ["atividades", obj.atividades],
            ["horas", obj.horas],
            ["financeiro", obj.financeiro]
          ];
          for(const [tabela, registros] of tabelasSimples){
            if(!Array.isArray(registros) || !registros.length) continue;
            const idsExistentes=new Set(DB.data[tabela].map(r=>r.id));
            const novos=registros.filter(r=>r.id && !idsExistentes.has(r.id));
            if(novos.length){
              await sbInsert(tabela, novos.map(toSnake));
              novosTotal+=novos.length;
            }
          }
          // sub-listas de projeto (stakeholders, riscos, reuniões)
          for(const p of (obj.projetos||[])){
            for(const [tabela, lista] of [["stakeholders",p.stakeholders],["riscos",p.riscos],["reunioes",p.reunioes]]){
              if(!Array.isArray(lista) || !lista.length) continue;
              const existentesDoProjeto=DB.data.projetos.find(x=>x.id===p.id);
              const idsExistentes=new Set((existentesDoProjeto?existentesDoProjeto[tabela]:[])?.map(r=>r.id)||[]);
              const novos=lista.filter(r=>r.id && !idsExistentes.has(r.id));
              if(novos.length){
                await sbInsert(tabela, novos.map(r=>toSnake(Object.assign({projetoId:p.id},r))));
                novosTotal+=novos.length;
              }
            }
          }
          await DB.load();
          toast(novosTotal? `${novosTotal} registro(s) importado(s).` : "Nada novo para importar — backup já estava sincronizado.");
          render();
        }catch(err){
          console.error(err);
          toast("Erro ao importar: "+(err.message||err));
        }
      }
    );
    e.target.value="";
  };
  reader.readAsText(file);
}

/* construtor de formulários genérico.
   campos: {key,label,type,required,options,help,dynamic,optionsFn} */
function openForm(cfg){
  const fields=cfg.fields, vals=Object.assign({},cfg.values||{});
  function fieldHtml(f){
    const v=(f.computed&&f.computeFn)?f.computeFn(vals):vals[f.key];
    const req=f.required?'<span class="req"> *</span>':"";
    const dis=(f.disabled||f.computed)?"disabled":"";
    let input="";
    if(f.type==="select"){
      const opts=(f.dynamic?f.optionsFn(vals):f.options)||[];
      input=`<select data-k="${f.key}" ${dis} ${f.dynamic?'data-dyn="1"':""}>
        <option value="">${f.placeholder||"Selecione…"}</option>
        ${opts.map(o=>`<option value="${esc(o.value)}" ${String(v)===String(o.value)?"selected":""}>${esc(o.label)}</option>`).join("")}</select>`;
    }else if(f.type==="textarea"){
      input=`<textarea data-k="${f.key}" ${dis} placeholder="${esc(f.placeholder||"")}">${esc(v||"")}</textarea>`;
    }else if(f.type==="date" && f.allowIndeterminate){
      const indet=(v==null||v==="");
      input=`<input type="date" data-k="${f.key}" ${dis} ${indet?"disabled":""} value="${esc(indet?"":v)}">
        <label style="display:flex;align-items:center;gap:6px;margin-top:7px;font-size:12px;color:var(--ink-soft);font-weight:400;cursor:pointer">
          <input type="checkbox" data-k-indet="${f.key}" ${indet?"checked":""} style="width:auto;margin:0"> Data indeterminada
        </label>`;
    }else{
      const t=f.type||"text";
      const extra=t==="number"?`step="${f.step||"any"}" min="${f.min!=null?f.min:""}"`:"";
      input=`<input type="${t}" data-k="${f.key}" ${dis} value="${esc(v==null?"":v)}" placeholder="${esc(f.placeholder||"")}" ${extra}>`;
    }
    return `<div class="fld ${f.full?"full":""}">
      <label>${esc(f.label)}${req}</label>${input}
      ${f.help?`<span class="help">${esc(f.help)}</span>`:""}</div>`;
  }
  const grid=fields.length>1?"two":"";
  $("#modal-root").innerHTML=`
  <div class="overlay"><div class="modal ${cfg.wide?"wide":""}">
    <div class="modal-head"><h3>${esc(cfg.title)}</h3>
      <button class="btn-icon" id="m-x">✕</button></div>
    <div class="modal-body">
      <div class="form-err" id="f-err"></div>
      <div class="form-grid ${grid}" id="f-grid">${fields.map(fieldHtml).join("")}</div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="m-cancel">Cancelar</button>
      <button class="btn" id="m-save">Salvar</button>
    </div></div></div>`;

  function collect(){
    $("#f-grid").querySelectorAll("[data-k]").forEach(el=>{
      if(el.disabled) return; // não sobrescreve valor de campo bloqueado
      const fdef=fields.find(f=>f.key===el.dataset.k);
      // campos de data vazios devem virar null, nunca "" — o Postgres rejeita
      // string vazia em coluna do tipo date com o erro 22007.
      if(fdef && fdef.type==="date" && el.value===""){
        vals[el.dataset.k]=null;
      } else {
        vals[el.dataset.k]=el.value;
      }
    });
  }
  function refreshDynamic(){
    fields.forEach(f=>{
      if(f.type==="select"&&f.dynamic){
        const sel=$("#f-grid").querySelector(`[data-k="${f.key}"]`);
        if(!sel) return;
        const cur=sel.value;
        const opts=f.optionsFn(vals)||[];
        sel.innerHTML=`<option value="">${f.placeholder||"Selecione…"}</option>`+
          opts.map(o=>`<option value="${esc(o.value)}">${esc(o.label)}</option>`).join("");
        if(opts.some(o=>String(o.value)===String(cur))) sel.value=cur;
        else vals[f.key]="";
      }
    });
  }
  // recalcula campos "computed" (ex.: valor total = quantidade × valor unitário)
  // a partir dos valores atuais e reflete no input desabilitado correspondente.
  function recomputeComputed(){
    fields.forEach(f=>{
      if(!(f.computed&&f.computeFn)) return;
      const el=$("#f-grid").querySelector(`[data-k="${f.key}"]`);
      if(!el) return;
      const val=f.computeFn(vals);
      vals[f.key]=val;
      el.value=(val==null||isNaN(val))?"":val;
    });
  }
  $("#f-grid").addEventListener("input",()=>{ collect(); recomputeComputed(); });
  $("#f-grid").addEventListener("change",(e)=>{
    collect(); refreshDynamic(); recomputeComputed();
    const key=e.target && e.target.dataset ? e.target.dataset.k : null;
    if(key && cfg.onFieldChange) cfg.onFieldChange(vals, key, $("#f-grid"));
  });
  $("#f-grid").querySelectorAll("[data-k-indet]").forEach(chk=>{
    chk.onchange=()=>{
      const key=chk.dataset.kIndet;
      const dateInput=$("#f-grid").querySelector(`input[type="date"][data-k="${key}"]`);
      if(chk.checked){
        dateInput.value=""; dateInput.disabled=true; vals[key]=null;
      }else{
        dateInput.disabled=false; vals[key]=dateInput.value||null;
      }
    };
  });
  $("#m-x").onclick=closeModal;
  $("#m-cancel").onclick=closeModal;
  $("#m-save").onclick=async()=>{
    collect();
    const faltando=fields.filter(f=>f.required&&!f.disabled&&!f.computed&&!String(vals[f.key]||"").trim());
    if(faltando.length){
      const err=$("#f-err");
      err.textContent="Preencha os campos obrigatórios: "+faltando.map(f=>f.label).join(", ")+".";
      err.style.display="block";
      return;
    }
    const btn=$("#m-save");
    btn.disabled=true; btn.textContent="Salvando...";
    try{
      await cfg.onSave(vals);
      closeModal();
    }catch(e){
      console.error(e);
      const err=$("#f-err");
      err.textContent="Erro ao salvar: "+(e.message||e);
      err.style.display="block";
      btn.disabled=false; btn.textContent="Salvar";
    }
  };
}

/* ---- FORM: PROJETO ---- */
function formProjeto(p){
  const edit=!!p;
  const fields=[
    {key:"nome",label:"Nome do projeto",required:true,full:true,placeholder:"Ex.: Implantação do Sistema X"},
    {key:"codigo",label:"Código / Sigla",placeholder:"Ex.: PRJ-2026-01"},
    {key:"cliente",label:"Cliente / Área demandante",placeholder:"Ex.: Diretoria Comercial"},
    {key:"gerente",label:"Gerente responsável",placeholder:"Nome do gestor do projeto"},
    {key:"dataInicio",label:"Data de início",type:"date"},
    {key:"dataFim",label:"Data de término prevista",type:"date"},
    {key:"receita",label:"Receita / Valor do projeto (R$)",type:"number",min:0,
      placeholder:"0,00",help:"Valor total contratado do projeto"},
    {key:"descricao",label:"Descrição / Escopo",type:"textarea",full:true,
      placeholder:"Objetivo e escopo resumido do projeto"}
  ];
  openForm({
    title:edit?"Editar projeto":"Novo projeto",
    wide:true,
    values:p||{status:"Planejado",dataInicio:todayStr()},
    fields,
    onSave:async(v)=>{
      v.receita=parseFloat(v.receita)||0;
      if(edit){
        Object.assign(p,v);
        // envia só os campos deste formulário — o objeto 'p' em memória também
        // carrega raci/stakeholders/riscos/reunioes, que não são colunas da
        // tabela 'projetos' (ficam em tabelas próprias) e não podem ir no update.
        const payload={};
        fields.forEach(f=>{ payload[f.key]=v[f.key]; });
        await sbUpdate("projetos", p.id, toSnake(payload));
        toast("Projeto atualizado.");
      } else {
        const novo=Object.assign({id:uid(),stakeholders:[],riscos:[],raci:{}},v);
        DB.data.projetos.push(novo);
        const {stakeholders,riscos,raci,...rest}=novo;
        await sbInsert("projetos", toSnake(rest));
        ST.view="projeto"; ST.projetoId=novo.id; ST.projTab="resumo";
        toast("Projeto criado.");
      }
      render();
    }
  });
}

      {key:"status",label:"Situação",type:"select",
        options:STATUS_ATIV.map(s=>({value:s,label:s})),
        help:"Marcar como \"Concluída\" preenche automaticamente 100% em % Concluído."},
      {key:"progresso",label:"% Concluído",type:"number",min:0,
        help:"Valor de 0 a 100",placeholder:"0"},
      {key:"horasPrevistas",label:"Horas previstas (estimativa de esforço)",type:"number",min:0,step:"0.5",
        placeholder:"Ex.: 40",
        help:"Opcional. Usado para calcular a ocupação da equipe no calendário (aba \"Ocupação da Equipe\"). Considera essa quantidade de horas TANTO para o Responsável QUANTO para cada pessoa marcada como \"R\" na RACI (não é dividido entre eles), ao longo dos dias úteis entre início e término previstos."}
    ],
    onFieldChange:(vv,key,gridEl)=>{
      if(key==="status" && vv.status==="Concluída"){
        vv.progresso=100;
        const inp=gridEl.querySelector('[data-k="progresso"]');
        if(inp) inp.value=100;
      }
    },
    onSave:async(v)=>{
      v.progresso=Math.max(0,Math.min(100,parseFloat(v.progresso)||0));
      v.horasPrevistas=parseFloat(v.horasPrevistas)||0;
      if(v.status==="Concluída") v.progresso=100;
      else if(v.progresso>=100) v.status="Concluída";
      if(edit){
        Object.assign(a,v);
        await sbUpdate("atividades", a.id, toSnake(v));
        toast("Atividade atualizada.");
      } else {
        const nova=Object.assign({id:uid(),projetoId},v);
        DB.data.atividades.push(nova);
        await sbInsert("atividades", toSnake(nova));
        toast("Atividade criada.");
      }
      render();
    }
  });
}

/* ---- FORM: HORAS ---- */
const ATIV_OUTROS="__outros__"; // valor sentinela do select de atividade para "digitar manualmente"
function formHoras(h){
  const edit=!!h;
  const fixedColab=currentColabId(); // colaborador logado (não-gestor): campo travado
  const meuId=USER.current?USER.current.colabId:null; // usado para pré-selecionar mesmo quando gestor
  const initial=h||{data:todayStr()};
  // se editando, pré-seleciona a atividade do cronograma vinculada; se a
  // atividade não existir mais (ou o registro nunca teve uma), cai em
  // "Outros" com o nome antigo preenchido no campo manual.
  if(edit){
    if(h.atividadeId && getAtividade(h.atividadeId)){
      initial.atividadeSel=h.atividadeId;
    } else {
      initial.atividadeSel=ATIV_OUTROS;
      const a=h.atividadeId?getAtividade(h.atividadeId):null;
      initial.atividadeManual=a?a.nome:(h.atividade||"");
    }
  }
  // pré-seleciona o próprio usuário logado ao criar um novo apontamento —
  // para colaborador o campo fica travado nele mesmo; para gestor vem
  // pré-preenchido com o próprio nome, mas continua editável (ele pode
  // trocar para apontar horas em nome de outra pessoa da equipe).
  if(!edit) initial.colaboradorId=fixedColab||meuId||"";

  // opções de atividade: as já cadastradas no cronograma do projeto
  // selecionado + "Outros" (para digitar manualmente uma atividade nova)
  function opcoesAtividade(vals){
    const ats=DB.data.atividades.filter(a=>a.projetoId===vals.projetoId && a.status!=="Cancelada")
      .sort((a,b)=>(a.dataInicioPrev||"").localeCompare(b.dataInicioPrev||"")||a.nome.localeCompare(b.nome,"pt-BR",{sensitivity:"base"}));
    const opts=ats.map(a=>({value:a.id, label:a.nome+(a.dataInicioPrev?" · "+fmtDate(a.dataInicioPrev):"")}));
    opts.push({value:ATIV_OUTROS, label:"➕ Outros (digitar manualmente)"});
    return opts;
  }
  // mostra/esconde o campo de texto livre conforme a seleção de atividade
  function syncCampoManual(grid){
    grid=grid||$("#f-grid");
    const sel=$('[data-k="atividadeSel"]',grid);
    const fldManual=$('[data-k="atividadeManual"]',grid);
    if(!sel||!fldManual) return;
    fldManual.closest(".fld").style.display=(sel.value===ATIV_OUTROS)?"":"none";
  }

  openForm({
    title:edit?"Editar apontamento":"Apontar horas",
    wide:true,
    values:initial,
    fields:[
      {key:"data",label:"Data",type:"date",required:true},
      {key:"colaboradorId",label:"Colaborador",type:"select",required:true,
        options:(fixedColab?[getColab(fixedColab)]:getInternos()).filter(Boolean).map(c=>({value:c.id,label:c.nome})),
        help:fixedColab?"Apontamento vinculado ao usuário logado.":""},
      {key:"projetoId",label:"Projeto",type:"select",required:true,
        options:DB.data.projetos.map(p=>({value:p.id,label:p.nome}))},
      {key:"atividadeSel",label:"Atividade",type:"select",required:true,dynamic:true,
        optionsFn:opcoesAtividade,
        help:"Escolha uma atividade já cadastrada no cronograma do projeto, ou \"Outros\" para digitar uma atividade nova."},
      {key:"atividadeManual",label:"Nome da atividade (Outros)",full:true,
        placeholder:"Digite o nome da atividade",
        help:"Será criada automaticamente no cronograma do projeto."},
      {key:"categoriaId",label:"Categoria da atividade",type:"select",required:true,
        options:DB.data.categorias.map(c=>({value:c.id,label:c.nome}))},
      {key:"horas",label:"Horas executadas",type:"number",required:true,min:0,step:"0.25",
        placeholder:"Ex.: 4,5"},
      {key:"descricao",label:"Observação",type:"textarea",full:true,
        placeholder:"Opcional"}
    ],
    onFieldChange:(vals,key,grid)=>{
      syncCampoManual(grid);
      // ao escolher uma atividade já cadastrada, pré-preenche a categoria
      // dela (usuário ainda pode trocar manualmente depois)
      if(key==="atividadeSel" && vals.atividadeSel && vals.atividadeSel!==ATIV_OUTROS){
        const a=getAtividade(vals.atividadeSel);
        if(a && a.categoriaId){
          vals.categoriaId=a.categoriaId;
          const catSel=$('[data-k="categoriaId"]',grid);
          if(catSel) catSel.value=a.categoriaId;
        }
      }
    },
    onSave:async(v)=>{
      v.horas=parseFloat(v.horas)||0;
      let atividadeId=null;
      if(v.atividadeSel && v.atividadeSel!==ATIV_OUTROS){
        // atividade já existente no cronograma: usa o id diretamente
        atividadeId=v.atividadeSel;
      } else {
        // "Outros": resolve/cria a atividade pelo nome digitado, via RPC
        // (funciona mesmo para colaborador comum, que não tem permissão
        // direta de INSERT na tabela de atividades)
        const nomeAtiv=(v.atividadeManual||"").trim();
        if(!nomeAtiv) throw new Error('Digite o nome da atividade em "Outros" ou selecione uma atividade do cronograma.');
        if(v.projetoId){
          const existente=DB.data.atividades.find(a=>
            a.projetoId===v.projetoId && (a.nome||"").trim().toLowerCase()===nomeAtiv.toLowerCase());
          if(existente){ atividadeId=existente.id; }
          else{
            const { data:novoId } = await sb.rpc("resolver_atividade", {
              p_projeto_id: v.projetoId, p_nome_atividade: nomeAtiv, p_categoria_id: v.categoriaId
            });
            atividadeId=novoId;
          }
        }
      }
      delete v.atividadeSel; delete v.atividadeManual; // não são colunas da tabela 'horas'

      if(edit){
        v.atividadeId=atividadeId;
        Object.assign(h,v);
        await sbUpdate("horas", h.id, toSnake(v));
        toast("Apontamento atualizado.");
        await DB.load();
      } else {
        // criação: insere diretamente, sempre vinculado ao colaborador
        // SELECIONADO NO FORMULÁRIO (v.colaboradorId) — não ao usuário
        // autenticado. Isso corrige o caso em que o gestor aponta horas em
        // nome de outra pessoa da equipe.
        await sbInsert("horas", toSnake({
          id:uid(), data:v.data, colaboradorId:v.colaboradorId, projetoId:v.projetoId,
          atividadeId, categoriaId:v.categoriaId, horas:v.horas, descricao:v.descricao||""
        }));
        toast("Horas registradas.");
      }
      await DB.load(); render();
    }
  });
  syncCampoManual(); // aplica a visibilidade inicial do campo manual
  // atalho para consultar a legenda das categorias sem fechar o formulário
  const catSelect=document.querySelector('#f-grid [data-k="categoriaId"]');
  if(catSelect){
    const fld=catSelect.closest(".fld");
    if(fld){
      const wrap=document.createElement("div");
      wrap.innerHTML=`<button type="button" id="toggle-legenda-inline" style="margin-top:6px;background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;text-align:left">ℹ️ O que significa cada categoria?</button>
        <div id="legenda-inline-box" style="display:none;margin-top:8px;padding:10px 12px;background:var(--bg);border-radius:8px;max-height:220px;overflow-y:auto"></div>`;
      fld.appendChild(wrap);
      const toggleBtn=document.getElementById("toggle-legenda-inline");
      const box=document.getElementById("legenda-inline-box");
      toggleBtn.onclick=(e)=>{
        e.preventDefault();
        const showing=box.style.display!=="none";
        box.style.display=showing?"none":"block";

      };

}

function formFinanceiro(projetoId,f){

      })
    : {projetoId:projetoId||"",tipo:"despesa",status:"previsto",data:todayStr(),quantidade:1,valorUnitario:""};

    title:edit?"Editar lançamento":"Novo lançamento financeiro",

    values:initial,
    fields:[
      {key:"projetoId",label:"Projeto",type:"select",required:true,
        options:DB.data.projetos.map(p=>({value:p.id,label:p.nome}))},
      {key:"tipo",label:"Tipo",type:"select",required:true,
        options:[{value:"receita",label:"Receita"},{value:"despesa",label:"Despesa"}]},
      {key:"rubricaId",label:"Rubrica",type:"select",required:true,
        options:DB.data.rubricas.map(r=>({value:r.id,label:r.nome}))},
      {key:"status",label:"Situação",type:"select",required:true,
        options:[{value:"previsto",label:"Previsto (a realizar)"},{value:"realizado",label:"Realizado"}]},
      {key:"data",label:"Data / Vencimento",type:"date",required:true,
        help:"Usada para alertas de prazo financeiro"},
      {key:"quantidade",label:"Quantidade",type:"number",required:true,min:0,step:"any",
        placeholder:"1",help:"Ex.: nº de licenças, diárias, itens…"},
      {key:"valorUnitario",label:"Valor unitário (R$)",type:"number",required:true,min:0,
        placeholder:"0,00"},
      {key:"valor",label:"Valor total (R$)",type:"number",computed:true,
        computeFn:vv=>Math.round(((parseFloat(vv.quantidade)||0)*(parseFloat(vv.valorUnitario)||0))*100)/100,
        help:"Calculado automaticamente: quantidade × valor unitário"},

    ],

        await sbUpdate("financeiro", f.id, toSnake(v));
        toast("Lançamento atualizado.");
      } else {
        const novo=Object.assign({id:uid()},v);
        DB.data.financeiro.push(novo);
        await sbInsert("financeiro", toSnake(novo));
        toast("Lançamento registrado.");
      }
      render();
    }
  });
}

/* ---- FORM: STAKEHOLDER (com classificação Primário/Secundário) ---- */
function formStakeholder(p,idx){
  const edit=idx!=null;
  const s=edit?p.stakeholders[idx]:{classificacao:"Secundário"};
  openForm({
    title:edit?"Editar stakeholder":"Novo stakeholder",
    values:s,
    fields:[
      {key:"nome",label:"Nome",required:true,full:true},
      {key:"papel",label:"Papel no projeto",placeholder:"Ex.: Patrocinador, Usuário-chave"},
      {key:"organizacao",label:"Organização / Setor"},
      {key:"influencia",label:"Nível de influência",type:"select",
        options:["Baixa","Média","Alta"].map(x=>({value:x,label:x}))},
      {key:"contato",label:"Contato (e-mail/telefone)",full:true},
      {key:"classificacao",label:"Classificação",type:"select",required:true,
        options:[{value:"Secundário",label:"Secundário"},{value:"Primário",label:"Primário"}]}
    ],
    onSave:async(v)=>{
      // verifica se é Primário e cria parceiro correspondente se não existir
      let colabVinculadoId = s.colaboradorVinculadoId || null;
      if(v.classificacao==="Primário"){
        const nomePessoa=v.nome.trim();
        if(nomePessoa){
          // busca por colaborador/parceiro existente com este nome
          const existente=DB.data.colaboradores.find(c=>
            (c.nome||"").trim().toLowerCase()===nomePessoa.toLowerCase()
          );
          if(!existente){
            // cria um novo parceiro
            const novoId=uid();
            await sbInsert("profiles", toSnake({
              id:novoId, nome:v.nome, tipoPessoa:"parceiro", papel:"colaborador",
              organizacao:v.organizacao||"", cargo:v.papel||"", email:"", custoHora:0
            }));
            colabVinculadoId=novoId;
            // recarrega DB para incluir o novo parceiro
            await DB.load();
            toast(`Parceiro "${v.nome}" criado automaticamente.`);
          } else {
            colabVinculadoId=existente.id;
          }
        }
      } else {
        // reclassificando de Primário para Secundário
        if(s.classificacao==="Primário" && v.classificacao==="Secundário" && s.colaboradorVinculadoId){
          const vinculoAtual=s.colaboradorVinculadoId;
          confirmar(
            "Remover vínculo com parceiro?",
            `Este stakeholder era "Primário" e tinha um parceiro vinculado. Deseja manter o parceiro "${nomeColab(vinculoAtual)}" cadastrado na equipe ou removê-lo?`,
            async(removerParceiro)=>{
              if(removerParceiro){
                // remove o parceiro da lista
                DB.data.colaboradores=DB.data.colaboradores.filter(c=>c.id!==vinculoAtual);
                await sbDelete("profiles", vinculoAtual);
                toast("Parceiro removido.");
              } else {
                toast("Parceiro mantido na equipe.");
              }
              colabVinculadoId=null;
              // recarrega
              await DB.load();
              render();
            },
            "Manter parceiro na equipe (se desmarcar, ele será removido)"
          );
          // Aguarda a confirmação — o fluxo é assíncrono
          return;
        }
      }

      // salva o stakeholder
      if(edit){
        Object.assign(p.stakeholders[idx], v);
        if(colabVinculadoId) p.stakeholders[idx].colaboradorVinculadoId = colabVinculadoId;
        await sbUpdate("stakeholders", s.id, toSnake(v));
      } else {
        const novo=Object.assign({id:uid(),projetoId:p.id}, v);
        if(colabVinculadoId) novo.colaboradorVinculadoId = colabVinculadoId;
        p.stakeholders.push(novo);
        await sbInsert("stakeholders", toSnake(novo));
      }
      toast("Stakeholder salvo."); render();
    }
  });
}
