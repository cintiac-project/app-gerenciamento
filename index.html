/* ============================================================
   AUTENTICAÇÃO (telas de entrar / criar conta)
   ============================================================ */
function renderAuthForm(tab){
  // vincula os tabs toda vez que renderiza (garante que o DOM já existe)
  const tLogin=$("#tab-login"), tSignup=$("#tab-signup");
  if(tLogin) tLogin.onclick=()=>renderAuthForm("login");
  if(tSignup) tSignup.onclick=()=>renderAuthForm("signup");

  if(tLogin) tLogin.classList.toggle("active", tab==="login");
  if(tSignup) tSignup.classList.toggle("active", tab==="signup");
  if(tLogin) tLogin.style.background = tab==="login" ? "var(--surface)" : "transparent";
  if(tSignup) tSignup.style.background = tab==="signup" ? "var(--surface)" : "transparent";
  // esconde as abas quando está em tela de recuperação/nova senha
  const authTabs=$("#auth-tabs");
  if(authTabs) authTabs.style.display = (tab==="recover"||tab==="newpass") ? "none" : "flex";
  $("#auth-err").style.display="none";

  const area=$("#auth-form-area");
  if(tab==="login"){
    area.innerHTML=`
      <div class="field" style="margin-bottom:11px"><label>E-mail</label>
        <input type="email" class="select" id="lg-email" placeholder="voce@empresa.com" style="width:100%"></div>
      <div class="field" style="margin-bottom:14px"><label>Senha</label>
        <input type="password" class="select" id="lg-pass" placeholder="••••••••" style="width:100%"></div>
      <button class="btn" id="lg-submit" style="width:100%;justify-content:center">Entrar</button>
      <p style="text-align:center;margin-top:12px">
        <button class="btn ghost sm" id="lg-forgot" style="border:none;font-size:12.5px;color:var(--ink-soft)">
          Esqueci minha senha
        </button>
      </p>`;
    $("#lg-submit").onclick=async()=>{
      const email=$("#lg-email").value.trim(), pass=$("#lg-pass").value;
      if(!email||!pass){ showAuthErr("Informe e-mail e senha."); return; }
      const { data, error } = await sb.auth.signInWithPassword({ email, password:pass });
      if(error){ showAuthErr(traduzErroAuth(error.message)); return; }
      await iniciarApp(data.session);
    };
    $("#lg-forgot").onclick=()=>renderAuthForm("recover");

  } else if(tab==="recover"){
    area.innerHTML=`
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;text-align:center">
        Informe o e-mail da conta. Enviaremos um link para você criar uma nova senha.</p>
      <div class="field" style="margin-bottom:14px"><label>E-mail</label>
        <input type="email" class="select" id="rec-email" placeholder="voce@empresa.com" style="width:100%"></div>
      <button class="btn" id="rec-submit" style="width:100%;justify-content:center">Enviar link de recuperação</button>
      <p style="text-align:center;margin-top:12px">
        <button class="btn ghost sm" id="rec-back" style="border:none;font-size:12.5px;color:var(--ink-soft)">
          ← Voltar ao login
        </button>
      </p>`;
    $("#rec-submit").onclick=async()=>{
      const email=$("#rec-email").value.trim();
      if(!email){ showAuthErr("Informe o e-mail."); return; }
      const btn=$("#rec-submit");
      btn.disabled=true; btn.textContent="Enviando...";
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href
      });
      if(error){
        showAuthErr("Erro ao enviar: "+error.message);
        btn.disabled=false; btn.textContent="Enviar link de recuperação";
        return;
      }
      area.innerHTML=`
        <div style="text-align:center;padding:14px 0">
          <div style="font-size:32px;margin-bottom:12px">📧</div>
          <h3 style="margin-bottom:8px">E-mail enviado!</h3>
          <p style="font-size:13px;color:var(--ink-soft)">
            Verifique a caixa de entrada de <b>${esc(email)}</b> e clique no link
            para criar uma nova senha.<br><br>
            Não esqueça de verificar também a pasta de spam.</p>
          <button class="btn ghost sm" style="margin-top:14px" id="rec-back2">← Voltar ao login</button>
        </div>`;
      $("#rec-back2").onclick=()=>renderAuthForm("login");
    };
    $("#rec-back").onclick=()=>renderAuthForm("login");

  } else if(tab==="newpass"){
    // usuário chegou aqui pelo link de recuperação de senha
    area.innerHTML=`
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;text-align:center">
        Escolha uma nova senha para sua conta.</p>
      <div class="field" style="margin-bottom:11px"><label>Nova senha</label>
        <input type="password" class="select" id="np-pass" placeholder="Mínimo 6 caracteres" style="width:100%"></div>
      <div class="field" style="margin-bottom:14px"><label>Confirmar nova senha</label>
        <input type="password" class="select" id="np-pass2" placeholder="Repita a senha" style="width:100%"></div>
      <button class="btn" id="np-submit" style="width:100%;justify-content:center">Salvar nova senha</button>`;
    $("#np-submit").onclick=async()=>{
      const p1=$("#np-pass").value, p2=$("#np-pass2").value;
      if(p1.length<6){ showAuthErr("A senha deve ter ao menos 6 caracteres."); return; }
      if(p1!==p2){ showAuthErr("As senhas não coincidem."); return; }
      const btn=$("#np-submit");
      btn.disabled=true; btn.textContent="Salvando...";

      // confirma que ainda há sessão ativa (token de recovery pode ter expirado)
      const { data:{ session:sessaoAtual } } = await sb.auth.getSession();
      if(!sessaoAtual){
        showAuthErr("O link de recuperação expirou. Solicite um novo link na tela de login.");
        btn.disabled=false; btn.textContent="Salvar nova senha";
        return;
      }

      const { error } = await sb.auth.updateUser({ password: p1 });
      if(error){
        showAuthErr("Erro ao salvar: "+error.message);
        btn.disabled=false; btn.textContent="Salvar nova senha";
        return;
      }

      // faz signOut para limpar o token de recovery e pedir login normal
      // com a nova senha — isso garante que a sessão fica em estado limpo
      await sb.auth.signOut();
      $("#auth-screen").style.display="flex";
      $("#app").style.display="none";
      renderAuthForm("login");
      toast("Senha salva! Faça login com a nova senha.");
    };

  } else {
    area.innerHTML=`
      <div class="field" style="margin-bottom:11px"><label>Nome completo</label>
        <input type="text" class="select" id="su-nome" placeholder="Seu nome" style="width:100%"></div>
      <div class="field" style="margin-bottom:11px"><label>E-mail</label>
        <input type="email" class="select" id="su-email" placeholder="voce@empresa.com" style="width:100%"></div>
      <div class="field" style="margin-bottom:14px"><label>Senha</label>
        <input type="password" class="select" id="su-pass" placeholder="Mínimo 6 caracteres" style="width:100%"></div>
      <button class="btn" id="su-submit" style="width:100%;justify-content:center">Criar conta</button>
      <p style="font-size:11.5px;color:var(--ink-faint);margin-top:10px;text-align:center">
        Novas contas entram como colaborador. O gestor pode promovê-lo em Equipe.</p>`;
    $("#su-submit").onclick=async()=>{
      const nome=$("#su-nome").value.trim(), email=$("#su-email").value.trim(), pass=$("#su-pass").value;
      if(!nome||!email||!pass){ showAuthErr("Preencha todos os campos."); return; }
      if(pass.length<6){ showAuthErr("A senha deve ter ao menos 6 caracteres."); return; }
      const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ nome } } });
      if(error){ showAuthErr(traduzErroAuth(error.message)); return; }
      toast("Conta criada! Entrando...");
      await iniciarApp(data.session);
    };
  }
}
function showAuthErr(msg){
  // garante que a tela de login esteja visível e renderizada
  if($("#auth-screen").style.display==="none"){
    $("#auth-screen").style.display="flex";
    $("#app").style.display="none";
    renderAuthForm("login");
  }
  const e=$("#auth-err"); if(!e) return;
  e.textContent=msg; e.style.display="block";
}
function traduzErroAuth(msg){
  if(/invalid login credentials/i.test(msg)) return "E-mail ou senha incorretos.";
  if(/already registered/i.test(msg)) return "Este e-mail já está cadastrado. Use \"Entrar\".";
  if(/password/i.test(msg)) return "Senha inválida (mínimo 6 caracteres).";
  return msg;
}
/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// Trava contra execuções concorrentes/duplicadas de iniciarApp: o listener
// onAuthStateChange dispara SIGNED_IN automaticamente logo depois de
// signInWithPassword/signUp, então iniciarApp acaba sendo chamada quase ao
// mesmo tempo pelo handler do formulário de login E pelo listener. Sem essa
// trava, a 2ª execução repete a busca/criação de perfil em paralelo com a 1ª;
// se o perfil ainda não existir, o 2º INSERT esbarra no 1º (conflito de
// chave), lança erro, cai no catch e chama showAuthErr — que, encontrando a
// tela de login já escondida (porque a 1ª chamada já tinha logado com
// sucesso), força tudo de volta para a tela de login mesmo com o app já
// carregado. É esse "voltar sozinho pro login" que dá a impressão de que o
// app não está logando.
let _iniciandoAppUserId = null;

async function iniciarApp(session){
  console.log("[PMO] iniciarApp, session:", session?"presente":"ausente");
  if(!session){
    const { data } = await sb.auth.getSession();
    session = data?.session;
    console.log("[PMO] getSession:", session?"encontrada":"nenhuma");
  }
  if(!session){
    console.log("[PMO] sem sessao, mostrando login");
    $("#auth-screen").style.display="flex";
    $("#app").style.display="none";
    renderAuthForm("login");
    return;
  }
  // já há uma inicialização em andamento para este mesmo usuário — ignora a chamada duplicada
  if(_iniciandoAppUserId === session.user.id){
    console.log("[PMO] iniciarApp já em andamento para este usuário, ignorando chamada duplicada");
    return;
  }
  // usuário já autenticado e app já carregado — nada a fazer
  if(USER.current && USER.session && USER.session.user.id === session.user.id){
    console.log("[PMO] usuário já autenticado e app já carregado, ignorando chamada duplicada");
    return;
  }
  _iniciandoAppUserId = session.user.id;
  console.log("[PMO] user:", session.user.id, session.user.email);
  try{
    console.log("[PMO] buscando profile via REST direto...");
    // usa fetch direto ao REST do Supabase em vez do SDK para evitar
    // travamento causado por token de sessão em estado inconsistente
    let prof = null, profErrMsg = null;
    try{
      const restResp = await Promise.race([
        fetch(
          SUPABASE_URL+"/rest/v1/profiles?id=eq."+session.user.id+"&select=*",
          { headers: {
              "apikey": SUPABASE_PUBLISHABLE_KEY,
              "Authorization": "Bearer "+session.access_token,
              "Content-Type": "application/json"
          }}
        ),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout 8s")),8000))
      ]);
      if(restResp.ok){
        const rows = await restResp.json();
        prof = rows && rows[0] ? rows[0] : null;
      } else {
        profErrMsg = "HTTP "+restResp.status;
      }
    }catch(fetchErr){
      profErrMsg = fetchErr.message;
    }
    console.log("[PMO] profile:", prof?JSON.stringify(prof):"null", "err:", profErrMsg||"ok");
    if(!prof){
      console.log("[PMO] criando profile...");
      const nome=session.user.user_metadata?.nome||session.user.email?.split("@")[0]||"Usuario";
      let novo=null, criarErrMsg=null;
      try{
        const rows = await sbInsert("profiles",
          { id:session.user.id, nome, papel:"colaborador", tipo_pessoa:"interno" });
        novo = Array.isArray(rows) ? rows[0] : rows;
      }catch(criarErr){ criarErrMsg = criarErr.message||String(criarErr); }
      console.log("[PMO] criar profile:", novo?JSON.stringify(novo):"null", "err:", criarErrMsg||"ok");
      if(!novo){ showAuthErr("Erro ao criar perfil: "+(criarErrMsg||"desconhecido")); return; }
      prof=novo;
      toast("Perfil criado. O gestor pode ajustar seu papel em Equipe.");
    }
    console.log("[PMO] configurando USER, papel:", prof.papel);
    USER.session=session; USER.profile=prof;
    USER.current={ tipo:prof.papel, colabId:prof.id, nome:prof.nome, email:session.user.email };
    $("#auth-screen").style.display="none";
    $("#app").style.display="flex";
    console.log("[PMO] carregando DB...");
    await DB.load();
    console.log("[PMO] renderizando...");
    render();
    DB.subscribeRealtime();
    console.log("[PMO] app pronto!");
  }catch(e){
    console.error("[PMO] ERRO:", e);
    showAuthErr("Erro: "+(e.message||e));
  } finally {
    if(_iniciandoAppUserId === session.user.id) _iniciandoAppUserId = null;
  }
}

// verifica PRIMEIRO se há um token de recovery no hash da URL
const _hash = window.location.hash;
const _isRecovery = _hash.includes("type=recovery") || _hash.includes("type=magiclink");
if(_isRecovery) history.replaceState(null, "", window.location.pathname);

// onAuthStateChange é o ponto de entrada único
sb.auth.onAuthStateChange(async(event, session)=>{
  if(event === "PASSWORD_RECOVERY" || (_isRecovery && event === "INITIAL_SESSION" && session)){
    // usuário chegou pelo link de recuperação — mostra tela de nova senha
    $("#auth-screen").style.display="flex";
    $("#app").style.display="none";
    renderAuthForm("newpass");
  } else if(event === "INITIAL_SESSION" || event === "SIGNED_IN"){
    // passa a session já disponível, evita chamada extra ao getSession
    await iniciarApp(session);
  } else if(event === "SIGNED_OUT"){
    USER.current = null; USER.session = null; USER.profile = null;
    $("#auth-screen").style.display="flex";
    $("#app").style.display="none";
    renderAuthForm("login");
    if(DB.channel) sb.removeChannel(DB.channel);
  }
});
</script>
